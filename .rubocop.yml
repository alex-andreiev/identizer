plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

# Local dev tool with HTML/XML heredocs and a banner — long lines and methods
# are expected in the view-ish handlers.
Layout/LineLength:
  Max: 120

# Keep dev dependencies declared in the gemspec.
Gemspec/DevelopmentDependencies:
  Enabled: false

Metrics/MethodLength:
  Max: 25
  Exclude:
    - "lib/identizer/handlers/**/*"
    - "lib/identizer/app.rb"
    - "lib/identizer/cli.rb"
    - "lib/identizer/server.rb"
    - "lib/identizer/tls.rb"
    - "lib/identizer/configuration.rb"
    - "lib/identizer/providers.rb"

# The router and the option parser are flat dispatch tables — long but trivial.
Metrics/AbcSize:
  Exclude:
    - "lib/identizer/handlers/**/*"
    - "lib/identizer/app.rb"
    - "lib/identizer/cli.rb"
    - "lib/identizer/configuration.rb"
    - "lib/identizer/server.rb"
    - "lib/identizer/tls.rb"
    - "lib/identizer/saml/keypair.rb"
    - "lib/identizer/saml/encryptor.rb"
    - "spec/**/*"

# Keyword args are self-documenting, so don't count them; the SAML builder also
# threads many positional SAML-spec parameters through small helpers.
Metrics/ParameterLists:
  CountKeywordArgs: false
  Exclude:
    - "lib/identizer/saml/response_builder.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/identizer/app.rb"
    - "lib/identizer/ldap/filter.rb"
    - "lib/identizer/ldap/server.rb"
    - "lib/identizer/handlers/saml.rb"

# `dn` is the standard LDAP term; allow it as a parameter name.
Naming/MethodParameterName:
  AllowedNames:
    - dn
    - id
    - to

Metrics/PerceivedComplexity:
  Exclude:
    - "lib/identizer/app.rb"

Metrics/ClassLength:
  Exclude:
    - "lib/identizer/handlers/**/*"
    - "lib/identizer/configuration.rb"
    - "lib/identizer/ldap/server.rb"
    - "lib/identizer/saml/response_builder.rb"

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
    - "lib/identizer/cli.rb"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

# Specs read better with expressive block and example names.
RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/InstanceVariable:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

# Flat spec/ layout and a couple of behaviour-described (non-class) specs.
RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false
